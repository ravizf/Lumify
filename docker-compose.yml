services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:4000
    depends_on:
      - core-api

  core-api:
    build:
      context: ./core-api
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://interviewdna:interviewdna@postgres:5432/interviewdna
      REDIS_URL: redis://redis:6379
      FRONTEND_ORIGIN: http://localhost:5173
    depends_on:
      - postgres
      - redis

  agent-engine:
    build:
      context: ./agent-engine
    ports:
      - "8000:8000"
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis

  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: interviewdna
      POSTGRES_PASSWORD: interviewdna
      POSTGRES_DB: interviewdna
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres-data:
