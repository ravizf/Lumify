events {}

http {
  upstream frontend {
    server frontend:5173;
  }

  upstream core_api {
    server core-api:4000;
  }

  upstream agent_service {
    server agent-engine:8000;
  }

  server {
    listen 80;

    location / {
      proxy_pass http://frontend;
    }

    location /api/ {
      proxy_pass http://core_api;
    }

    location /agents/ {
      proxy_pass http://agent_service;
    }
  }
}
